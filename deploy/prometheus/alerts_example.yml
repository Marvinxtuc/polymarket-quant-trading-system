route:
  receiver: default-warning
  group_by: ["alertname", "alert_code", "severity"]
  group_wait: 30s
  group_interval: 2m
  repeat_interval: 30m
  routes:
    - matchers:
        - severity="page"
      receiver: pagerduty-page
      continue: true
    - matchers:
        - severity="warning"
      receiver: slack-warning

receivers:
  - name: pagerduty-page
    pagerduty_configs:
      - routing_key: REPLACE_WITH_PAGERDUTY_KEY
        severity: "{{ .CommonLabels.severity }}"
        description: "{{ .CommonLabels.alert_code }} {{ .CommonAnnotations.summary }}"
  - name: slack-warning
    slack_configs:
      - api_url: REPLACE_WITH_SLACK_WEBHOOK
        channel: "#polymarket-alerts"
        title: "{{ .CommonLabels.alert_code }}"
        text: "{{ .CommonAnnotations.summary }} -- {{ .CommonAnnotations.description }}"
  - name: default-warning
    slack_configs:
      - api_url: REPLACE_WITH_SLACK_WEBHOOK
        channel: "#polymarket-alerts"
        title: "{{ .CommonLabels.alert_code }}"
        text: "{{ .CommonAnnotations.summary }} -- {{ .CommonAnnotations.description }}"

