<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="app.title"></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260319d" />
</head>
<body>
  <div class="bg-grid"></div>
  <main class="console">
    <header class="panel topbar">
      <section class="brand-wrap">
        <span class="pill paper" id="mode-pill" data-i18n="app.modeBadge.paper"></span>
        <div>
          <h1 data-i18n="app.systemName"></h1>
          <p id="status-line"></p>
        </div>
      </section>
      <section class="top-actions">
        <span class="status" id="live-status"><span class="dot" id="live-status-dot"></span><span id="live-status-label" data-i18n="app.liveStatus.online"></span></span>
        <span class="guard" id="ops-gate-pill"></span>
        <span class="guard" id="guard-line"></span>
        <button class="btn" id="btn-pause-opening" data-i18n="app.control.pauseOpening.enable"></button>
        <button class="btn ghost" id="btn-reduce-only" data-i18n="app.control.reduceOnly.enable"></button>
        <button class="btn warn" id="btn-emergency-stop" data-i18n="app.control.emergencyStop.enable"></button>
      </section>
    </header>

    <section class="panel candidate-panel" id="candidate-panel">
      <div class="head">
        <h2 data-i18n="candidate.panel.title"></h2>
        <span class="mono" id="candidate-meta"></span>
      </div>
      <p class="api-status wait" id="candidate-panel-status" data-i18n="common.waitingData"></p>
      <div class="candidate-toolbar">
        <div class="candidate-toolbar-main">
          <div class="candidate-toolbar-primary">
            <div class="mode-switch" id="decision-mode-switch">
              <button class="chip active" type="button" data-mode="manual" data-i18n="enum.mode.manual"></button>
              <button class="chip" type="button" data-mode="semi_auto" data-i18n="enum.mode.semi_auto"></button>
              <button class="chip" type="button" data-mode="auto" data-i18n="enum.mode.auto"></button>
            </div>
            <div class="candidate-summary" id="candidate-summary">
              <span class="chip active"></span>
              <span class="chip"></span>
              <span class="chip"></span>
              <span class="chip"></span>
              <span class="chip"></span>
            </div>
          </div>
          <div class="candidate-toolbar-actions">
            <label class="candidate-search">
              <span data-i18n="candidate.panel.searchLabel"></span>
              <input id="candidate-search-input" type="search" data-i18n-placeholder="candidate.panel.searchPlaceholder" />
            </label>
            <label class="candidate-sort">
              <span data-i18n="candidate.panel.sortLabel"></span>
              <select id="candidate-sort-select">
                <option value="score_desc" data-i18n="candidate.sort.score_desc"></option>
                <option value="freshness_desc" data-i18n="candidate.sort.freshness_desc"></option>
                <option value="confidence_desc" data-i18n="candidate.sort.confidence_desc"></option>
                <option value="wallet_score_desc" data-i18n="candidate.sort.wallet_score_desc"></option>
                <option value="observed_notional_desc" data-i18n="candidate.sort.observed_notional_desc"></option>
              </select>
            </label>
            <button class="btn ghost btn-mini" id="candidate-toggle-filters" type="button" data-i18n="candidate.panel.toggleFiltersExpand"></button>
            <button class="btn ghost" id="candidate-clear-filters" type="button" data-i18n="candidate.panel.clearFilters"></button>
          </div>
        </div>
        <p class="api-status wait candidate-filter-meta" id="candidate-filter-meta"></p>
        <div class="candidate-toolbar-filters" id="candidate-toolbar-filters">
          <div class="candidate-filter-group" data-filter-group="status">
            <span data-i18n="candidate.filter.status"></span>
            <div class="chip-row">
              <button class="chip active" type="button" data-candidate-filter="status" data-filter-value="all" data-i18n="candidate.filter.all"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="pending" data-i18n="candidate.status.pending"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="approved" data-i18n="candidate.status.approved"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="watched" data-i18n="candidate.status.watched"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="executed" data-i18n="candidate.status.executed"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="ignored" data-i18n="candidate.status.ignored"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="rejected" data-i18n="candidate.status.rejected"></button>
              <button class="chip" type="button" data-candidate-filter="status" data-filter-value="expired" data-i18n="candidate.status.expired"></button>
            </div>
          </div>
          <div class="candidate-filter-group" data-filter-group="action">
            <span data-i18n="candidate.filter.action"></span>
            <div class="chip-row">
              <button class="chip active" type="button" data-candidate-filter="action" data-filter-value="all" data-i18n="candidate.filter.all"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="ignore" data-i18n="candidate.action.ignore"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="watch" data-i18n="candidate.action.watch"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="buy_small" data-i18n="candidate.action.buy_small"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="buy_normal" data-i18n="candidate.action.buy_normal"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="follow" data-i18n="candidate.action.follow"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="close_partial" data-i18n="candidate.action.close_partial"></button>
              <button class="chip" type="button" data-candidate-filter="action" data-filter-value="close_all" data-i18n="candidate.action.close_all"></button>
            </div>
          </div>
          <div class="candidate-filter-group" data-filter-group="side">
            <span data-i18n="candidate.filter.side"></span>
            <div class="chip-row">
              <button class="chip active" type="button" data-candidate-filter="side" data-filter-value="all" data-i18n="candidate.filter.all"></button>
              <button class="chip" type="button" data-candidate-filter="side" data-filter-value="BUY" data-i18n="candidate.side.buy"></button>
              <button class="chip" type="button" data-candidate-filter="side" data-filter-value="SELL" data-i18n="candidate.side.sell"></button>
            </div>
          </div>
        </div>
      </div>
      <div class="candidate-workspace">
      <div class="candidate-queue">
        <div class="head compact-head">
          <h2 data-i18n="candidate.panel.queueTitle"></h2>
          <span class="mono" id="candidate-grid-meta"></span>
        </div>
        <p class="api-status wait candidate-queue-note" data-i18n="candidate.panel.queueNote"></p>
        <div class="candidate-grid" id="candidate-grid">
          <article class="candidate-card candidate-empty">
            <div>
              <h3 data-i18n="candidate.panel.emptyTitle.noOpportunity"></h3>
              <p data-i18n="candidate.panel.emptyBody.noOpportunity"></p>
            </div>
          </article>
        </div>
      </div>
      <section class="candidate-focus" id="candidate-focus">
        <div class="head">
          <h2 data-i18n="candidate.detail.title"></h2>
          <span class="mono" id="candidate-focus-meta" data-i18n="common.waitingData"></span>
        </div>
        <div class="focus-view-switch" id="candidate-focus-view-switch">
          <button class="chip active" type="button" data-candidate-focus-view="summary" data-i18n="enum.candidateFocusView.summary"></button>
          <button class="chip" type="button" data-candidate-focus-view="detail" data-i18n="enum.candidateFocusView.detail"></button>
        </div>
        <div class="candidate-focus-view active" data-candidate-focus-view-panel="summary">
        <div class="candidate-focus-shell">
          <div class="candidate-focus-main">
            <section class="candidate-focus-section candidate-focus-overview">
              <div class="profile-head" id="candidate-focus-head">
                <span class="tag wait" data-i18n="common.waiting"></span>
                <span class="mono" data-i18n="candidate.detail.selectHint"></span>
              </div>
              <p class="profile-summary" id="candidate-focus-summary" data-i18n="candidate.detail.summary"></p>
              <ul class="list tight" id="candidate-focus-list">
                <li><span data-i18n="candidate.detail.status"></span><b data-i18n="common.waitingData"></b></li>
              </ul>
              <div class="component-grid" id="candidate-focus-metrics">
                <div class="component-card"><span data-i18n="candidate.detail.deepRead"></span><b data-i18n="common.waitingData"></b></div>
              </div>
            </section>
            <section class="candidate-focus-section">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.breakdown"></h2><span class="mono" id="candidate-focus-breakdown-meta" data-i18n="candidate.detail.breakdownMeta"></span></div>
              <div class="component-grid candidate-focus-breakdown" id="candidate-focus-breakdown">
                <div class="component-card"><span data-i18n="candidate.detail.breakdownCard"></span><b data-i18n="common.waitingData"></b></div>
              </div>
            </section>
            <section class="candidate-focus-section">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.conflict"></h2><span class="mono" id="candidate-focus-conflict-meta" data-i18n="candidate.detail.conflictMeta"></span></div>
              <div class="component-grid candidate-focus-conflict" id="candidate-focus-conflict">
                <div class="component-card"><span data-i18n="candidate.detail.conflictCard"></span><b data-i18n="common.waitingData"></b></div>
              </div>
            </section>
            <section class="candidate-focus-section">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.trail"></h2><span class="mono" id="candidate-focus-trail-meta" data-i18n="candidate.detail.trailMeta"></span></div>
              <ul class="review-list candidate-focus-trail" id="candidate-focus-trail">
                <li><div class="review-main"><span data-i18n="candidate.detail.trail"></span><b data-i18n="common.waitingData"></b></div></li>
              </ul>
            </section>
          </div>
          <div class="candidate-focus-side">
            <section class="candidate-focus-section candidate-focus-section-primary">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.factors"></h2><span class="mono" id="candidate-focus-factors-meta" data-i18n="candidate.detail.factorsMeta"></span></div>
              <div class="candidate-focus-summary-board" id="candidate-focus-factors">
                <div class="component-card"><span data-i18n="candidate.detail.factorsCard"></span><b data-i18n="common.waitingData"></b></div>
              </div>
            </section>
            <section class="candidate-focus-section">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.explain"></h2><span class="mono" id="candidate-focus-explain-meta" data-i18n="candidate.detail.explainMeta"></span></div>
              <ul class="review-list candidate-focus-explain" id="candidate-focus-explain">
                <li><div class="review-main"><span data-i18n="candidate.detail.explainLabel"></span><b data-i18n="common.waitingData"></b></div></li>
              </ul>
            </section>
            <section class="candidate-focus-section">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.records"></h2><span class="mono" id="candidate-focus-status" data-i18n="common.waitingData"></span></div>
              <ul class="review-list candidate-focus-actions" id="candidate-focus-action">
                <li><div class="review-main"><span data-i18n="candidate.detail.status"></span><b data-i18n="common.waitingData"></b></div></li>
              </ul>
            </section>
            <section class="candidate-focus-section">
              <div class="head compact-head"><h2 data-i18n="candidate.detail.enrichment"></h2><span class="mono" data-i18n="candidate.detail.enrichmentMeta"></span></div>
              <div class="component-grid candidate-focus-snapshot" id="candidate-focus-snapshot">
                <div class="component-card"><span data-i18n="candidate.detail.snapshot"></span><b data-i18n="common.waitingData"></b></div>
              </div>
            </section>
          </div>
        </div>
        </div>
        <div class="candidate-focus-view" data-candidate-focus-view-panel="detail">
        <div class="head compact-head"><h2 data-i18n="candidate.detail.fullTitle"></h2><span class="mono" id="candidate-detail-meta" data-i18n="common.waitingData"></span></div>
        <div class="component-grid candidate-detail-overview" id="candidate-detail-overview">
          <div class="component-card"><span data-i18n="candidate.detail.page"></span><b data-i18n="common.waitingData"></b></div>
        </div>
        <div class="review-grid candidate-detail-grid">
          <section class="review-column">
            <h3 data-i18n="candidate.detail.timeline"></h3>
            <ul class="review-list candidate-detail-list" id="candidate-detail-timeline">
              <li><div class="review-main"><span data-i18n="candidate.detail.timeline"></span><b data-i18n="common.waitingData"></b></div></li>
            </ul>
          </section>
          <section class="review-column">
            <h3 data-i18n="candidate.detail.decisionChain"></h3>
            <ul class="review-list candidate-detail-list" id="candidate-detail-chain">
              <li><div class="review-main"><span data-i18n="candidate.detail.decisionChain"></span><b data-i18n="common.waitingData"></b></div></li>
            </ul>
          </section>
          <section class="review-column">
            <h3 data-i18n="candidate.detail.actionLog"></h3>
            <ul class="review-list candidate-detail-list" id="candidate-detail-actions">
              <li><div class="review-main"><span data-i18n="candidate.detail.action"></span><b data-i18n="common.waitingData"></b></div></li>
            </ul>
          </section>
          <section class="review-column">
            <h3 data-i18n="candidate.detail.journal"></h3>
            <ul class="review-list candidate-detail-list" id="candidate-detail-journal">
              <li><div class="review-main"><span data-i18n="candidate.detail.journal"></span><b data-i18n="common.waitingData"></b></div></li>
            </ul>
          </section>
        </div>
        </div>
      </section>
      </div>
    </section>

    <section class="panel workspace-shell" id="workspace-shell">
      <div class="workspace-nav" id="workspace-nav">
        <button class="chip active" type="button" data-workspace-view="overview" data-i18n="nav.workspace.overview"></button>
        <button class="chip" type="button" data-workspace-view="wallets" data-i18n="nav.workspace.wallets"></button>
        <button class="chip" type="button" data-workspace-view="ops" data-i18n="nav.workspace.ops"></button>
        <button class="chip" type="button" data-workspace-view="review" data-i18n="nav.workspace.review"></button>
      </div>
      <p class="api-status wait" id="workspace-meta"></p>
    </section>

    <section class="panel ops-banner ops-wait workspace-item" id="ops-banner" data-workspace-group="overview ops">
      <div class="ops-banner-main">
        <span class="tag wait" id="ops-gate-tag" data-i18n="opsGate.banner.tag.wait"></span>
        <div>
          <h2 id="ops-gate-title" data-i18n="opsGate.banner.title"></h2>
          <p id="ops-gate-detail" data-i18n="opsGate.banner.detail"></p>
        </div>
      </div>
      <ul class="ops-checks" id="ops-gate-checks">
        <li><span data-i18n="opsGate.banner.checks.status"></span><b data-i18n="common.waitingData"></b></li>
      </ul>
      <div class="ops-actions-wrap">
        <div class="head compact-head"><h2 data-i18n="opsGate.banner.actions.title"></h2><span class="mono" id="ops-gate-actions-meta" data-i18n="opsGate.banner.actions.meta"></span></div>
        <ul class="ops-actions" id="ops-gate-actions">
          <li><span class="tag wait" data-i18n="opsGate.banner.actions.waitingTag"></span><div><b data-i18n="opsGate.banner.actions.waitingTitle"></b><p data-i18n="opsGate.banner.actions.waitingDetail"></p></div></li>
        </ul>
      </div>
    </section>

    <section class="panel card card-catalysts workspace-item" id="blockbeats-panel" data-workspace-group="overview">
      <div class="head">
        <h2 data-i18n="blockbeats.panel.title"></h2>
        <span class="mono" id="blockbeats-meta"></span>
      </div>
      <p class="api-status wait" id="blockbeats-status" data-i18n="blockbeats.panel.waiting"></p>
      <div class="component-grid catalyst-summary" id="blockbeats-summary">
        <div class="component-card"><span data-i18n="blockbeats.summary.status"></span><b data-i18n="common.waitingData"></b></div>
      </div>
      <div class="catalyst-columns">
        <section class="catalyst-column">
          <div class="head compact-head">
            <h2 data-i18n="blockbeats.feed.prediction.title"></h2>
            <span class="mono" data-i18n="blockbeats.feed.prediction.subtitle"></span>
          </div>
          <ul class="review-list catalyst-list" id="blockbeats-prediction-list">
            <li><div class="review-main"><span data-i18n="blockbeats.feed.prediction.title"></span><b data-i18n="common.waitingData"></b></div></li>
          </ul>
        </section>
        <section class="catalyst-column">
          <div class="head compact-head">
            <h2 data-i18n="blockbeats.feed.important.title"></h2>
            <span class="mono" data-i18n="blockbeats.feed.important.subtitle"></span>
          </div>
          <ul class="review-list catalyst-list" id="blockbeats-important-list">
            <li><div class="review-main"><span data-i18n="blockbeats.feed.important.title"></span><b data-i18n="common.waitingData"></b></div></li>
          </ul>
        </section>
      </div>
    </section>

    <section class="panel budget-card workspace-item" data-workspace-group="overview">
      <div class="head"><h2 data-i18n="budget.overview.title"></h2><span class="mono" id="budget-meta" data-i18n="budget.overview.meta"></span></div>
      <div class="budget-line">
        <div class="budget-fill" id="budget-fill" style="width:0%"></div>
      </div>
    </section>

    <section class="kpi-row workspace-item" data-workspace-group="overview">
      <article class="panel kpi">
        <h3 data-i18n="kpi.executionMode.title"></h3>
        <p class="num" id="kpi-mode" data-i18n="kpi.executionMode.value"></p>
        <small id="kpi-mode-note" data-i18n="kpi.executionMode.note"></small>
      </article>
      <article class="panel kpi">
        <h3 data-i18n="kpi.equity.title"></h3>
        <p class="num good" id="kpi-equity" data-i18n="kpi.equity.value"></p>
        <small id="kpi-equity-note" data-i18n="kpi.equity.note"></small>
      </article>
      <article class="panel kpi">
        <h3 data-i18n="kpi.cash.title"></h3>
        <p class="num" id="kpi-cash" data-i18n="kpi.cash.value"></p>
        <small id="kpi-cash-note" data-i18n="kpi.cash.note"></small>
      </article>
      <article class="panel kpi">
        <h3 data-i18n="kpi.positions.title"></h3>
        <p class="num" id="kpi-pos" data-i18n="kpi.positions.value"></p>
        <small id="kpi-slot-note" data-i18n="kpi.positions.note"></small>
      </article>
      <article class="panel kpi">
        <h3 data-i18n="kpi.notional.title"></h3>
        <p class="num" id="kpi-notional" data-i18n="kpi.notional.value"></p>
        <small id="kpi-notional-note" data-i18n="kpi.notional.note"></small>
      </article>
      <article class="panel kpi">
        <h3 data-i18n="kpi.risk.title"></h3>
        <p class="num warn" id="kpi-risk-mode" data-i18n="kpi.risk.value"></p>
        <small id="kpi-risk-note" data-i18n="kpi.risk.note"></small>
      </article>
    </section>

    <section class="main-grid workspace-item" data-workspace-group="overview wallets">
      <div class="main-col primary-col">
        <article class="panel card card-positions" data-workspace-group="overview">
          <div class="head"><h2 data-i18n="positions.table.title"></h2><span class="mono" data-i18n="positions.table.subtitle"></span></div>
          <div class="table-wrap">
            <table class="table">
              <thead><tr><th data-i18n="positions.table.market"></th><th data-i18n="positions.table.side"></th><th data-i18n="positions.table.size"></th><th data-i18n="positions.table.notional"></th><th data-i18n="positions.table.entryPrice"></th><th data-i18n="positions.table.holdTime"></th><th data-i18n="positions.table.reason"></th><th data-i18n="positions.table.exitRule"></th></tr></thead>
              <tbody id="positions-body">
                <tr><td colspan="8" data-i18n="common.waitingData"></td></tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="panel card card-orders" id="orders-panel" data-workspace-group="overview">
          <div class="head"><h2 data-i18n="orders.panel.title"></h2><span class="mono" data-i18n="orders.panel.subtitle"></span></div>
          <div class="chips">
            <span class="chip active" id="chip-pending" data-i18n="orders.status.pending"></span>
            <span class="chip" id="chip-filled" data-i18n="orders.status.filled"></span>
            <span class="chip" id="chip-canceled" data-i18n="orders.status.canceled"></span>
            <span class="chip" id="chip-rejected" data-i18n="orders.status.rejected"></span>
          </div>
          <div class="table-wrap small-scroll">
            <table class="table">
              <thead><tr><th data-i18n="orders.table.time"></th><th data-i18n="orders.table.market"></th><th data-i18n="orders.table.action"></th><th data-i18n="orders.table.status"></th><th data-i18n="orders.table.reason"></th></tr></thead>
              <tbody id="orders-body">
                <tr><td colspan="5" data-i18n="common.waitingData"></td></tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="panel card card-wallets" data-workspace-group="wallets">
          <div class="head"><h2 data-i18n="wallets.monitor.title"></h2><span class="mono" data-i18n="wallets.monitor.subtitle"></span></div>
          <div class="table-wrap small-scroll">
            <table class="table">
              <thead><tr><th data-i18n="wallets.monitor.table.wallet"></th><th data-i18n="wallets.monitor.table.score"></th><th data-i18n="wallets.monitor.table.samples"></th><th data-i18n="wallets.monitor.table.roi"></th><th data-i18n="wallets.monitor.table.winRate"></th><th data-i18n="wallets.monitor.table.parsed"></th><th data-i18n="wallets.monitor.table.concentration"></th></tr></thead>
              <tbody id="wallets-body">
                <tr><td colspan="7" data-i18n="common.waitingData"></td></tr>
              </tbody>
            </table>
          </div>
        </article>
